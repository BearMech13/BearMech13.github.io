<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join the Beta — Homeschool Survival Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:   #f59e0b;
      --amber-d: #d97706;
      --amber-l: #fef3c7;
      --green:   #059669;
      --green-l: #d1fae5;
      --pink:    #ec4899;
      --cream:   #fffbf0;
      --brown:   #78350f;
      --text-1:  #1c1007;
      --text-2:  #5c4a2a;
      --text-3:  #9c8060;
      --danger:  #dc2626;
    }

    html, body {
      min-height: 100%;
      font-family: "DM Sans", sans-serif;
      background: var(--cream);
      color: var(--text-1);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(245,158,11,.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 15%,  rgba(236,72,153,.10) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 10% 85%,  rgba(5,150,105,.10)  0%, transparent 60%),
        var(--cream);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(120,53,15,.05) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem;
    }

    .back-link {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-3);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .back-link:hover { color: var(--amber-d); }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--amber), var(--pink), var(--green));
      border-radius: 99px;
      padding: 0.35rem 1.1rem;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 16px rgba(245,158,11,.3);
    }

    /* Headline */
    h1 {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.1;
      text-align: center;
      color: var(--text-1);
      margin-bottom: 0.4rem;
    }
    .sub {
      font-size: 0.92rem;
      color: var(--text-2);
      text-align: center;
      line-height: 1.6;
      max-width: 380px;
      margin-bottom: 2rem;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,.88);
      border: 1.5px solid rgba(245,158,11,.2);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 40px rgba(120,53,15,.1);
    }

    /* Form fields */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.72rem 0.9rem;
      border-radius: 12px;
      border: 1.5px solid rgba(245,158,11,.25);
      background: rgba(255,255,255,.95);
      font-family: "DM Sans", sans-serif;
      font-size: 0.92rem;
      color: var(--text-1);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245,158,11,.15);
    }
    .field input::placeholder { color: var(--text-3); }
    .field input.error { border-color: var(--danger); }

    .field-hint {
      font-size: 0.68rem;
      color: var(--text-3);
      margin-top: 0.3rem;
      line-height: 1.5;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 0.82rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--amber), var(--amber-d));
      color: #fff;
      font-family: "DM Sans", sans-serif;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: filter .15s, transform .1s;
      box-shadow: 0 4px 16px rgba(245,158,11,.35);
    }
    .submit-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; filter: none; }

    /* Messages */
    .msg {
      display: none;
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .msg.error { background: rgba(220,38,38,.08); border: 1.5px solid rgba(220,38,38,.25); color: var(--danger); }
    .msg.success { background: var(--green-l); border: 1.5px solid rgba(5,150,105,.3); color: #065f46; }
    .msg.show { display: block; }

    /* Agreement */
    .agreement {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin: 1rem 0 1.25rem;
      font-size: 0.75rem;
      color: var(--text-2);
      line-height: 1.55;
    }
    .agreement input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 0.1rem;
      cursor: pointer;
      accent-color: var(--amber);
    }
    .agreement a { color: var(--amber-d); font-weight: 600; text-decoration: none; }
    .agreement a:hover { text-decoration: underline; }

    /* Divider */
    .divider { border: none; border-top: 1px solid rgba(245,158,11,.15); margin: 1.25rem 0; }

    .signin-link {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-3);
    }
    .signin-link a { color: var(--amber-d); font-weight: 700; text-decoration: none; }
    .signin-link a:hover { text-decoration: underline; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 440px) {
      .card { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <a class="back-link" href="index.html">&larr; Back</a>

  <div class="badge">&#10022; Beta Access</div>

  <h1>Join the Beta</h1>
  <p class="sub">Create your free account using the invite code we sent you.</p>

  <div class="card">

    <div class="msg error" id="error-msg"></div>
    <div class="msg success" id="success-msg"></div>

    <form id="signup-form">

      <div class="field">
        <label for="family-name">Family Name</label>
        <input type="text" id="family-name" placeholder="e.g. The Smith Family" autocomplete="name"/>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required/>
        <p class="field-hint">Minimum 8 characters. You&rsquo;ll use this to log in.</p>
      </div>

      <div class="field">
        <label for="invite-code">Invite Code</label>
        <input type="text" id="invite-code" placeholder="e.g. A1B2C3D4" autocomplete="off" required
          style="text-transform:uppercase;letter-spacing:0.1em;font-family:monospace;font-size:1rem;"/>
        <p class="field-hint">Enter the invite code from your email. Codes are case-insensitive.</p>
      </div>

      <div class="agreement">
        <input type="checkbox" id="agree" required/>
        <label for="agree">
          I have read and agree to the
          <a href="beta-agreement.html" target="_blank">Beta Tester Agreement</a>,
          <a href="privacy.html" target="_blank">Privacy Policy</a>, and
          <a href="childrens-privacy.html" target="_blank">Children&rsquo;s Privacy Supplement</a>.
        </label>
      </div>

      <button class="submit-btn" type="submit" id="submit-btn">
        Create My Account
      </button>

    </form>

    <hr class="divider"/>
    <p class="signin-link">Already have an account? <a href="login.html">Sign in</a></p>

  </div>

</div>

<script>
  /* ── Supabase init ── */
  var SUPABASE_URL = 'https://mhrpudetaeppplxelvnu.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_QEV6TDZT-ZOKosE1Nylo-A_om1787gG';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var form = document.getElementById('signup-form');
  var submitBtn = document.getElementById('submit-btn');
  var errorMsg = document.getElementById('error-msg');
  var successMsg = document.getElementById('success-msg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    successMsg.classList.remove('show');
  }

  function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.classList.add('show');
    errorMsg.classList.remove('show');
  }

  function setLoading(loading) {
    if (loading) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Creating account...';
    } else {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Create My Account';
    }
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    var familyName = document.getElementById('family-name').value.trim();
    var email = document.getElementById('email').value.trim().toLowerCase();
    var password = document.getElementById('password').value;
    var inviteCode = document.getElementById('invite-code').value.trim().toUpperCase();
    var agreed = document.getElementById('agree').checked;

    /* Basic validation */
    if (!email || !password || !inviteCode) {
      showError('Please fill in all required fields.');
      return;
    }
    if (password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }
    if (!agreed) {
      showError('Please read and agree to the Beta Tester Agreement and Privacy Policy.');
      return;
    }

    setLoading(true);
    errorMsg.classList.remove('show');

    /* Step 1: Validate invite code */
    sb.rpc('validate_invite_code', { p_code: inviteCode, p_email: email })
      .then(function(result) {
        if (result.error) {
          showError('Something went wrong checking your invite code. Please try again.');
          setLoading(false);
          return;
        }
        if (!result.data) {
          showError('That invite code is not valid for this email address. Please check both and try again.');
          setLoading(false);
          return;
        }

        /* Step 2: Create Supabase auth account */
        return sb.auth.signUp({
          email: email,
          password: password,
          options: {
            data: { family_name: familyName }
          }
        });
      })
      .then(function(result) {
        if (!result) return; /* already handled above */
        if (result.error) {
          showError(result.error.message || 'Could not create account. Please try again.');
          setLoading(false);
          return;
        }

        var userId = result.data.user.id;

        /* Step 3: Claim the invite code */
        return sb.rpc('claim_invite_code', {
          p_code: inviteCode,
          p_email: email,
          p_user_id: userId
        });
      })
      .then(function(result) {
        if (!result) return;
        if (result.error) {
          /* Non-fatal - account was created, just log it */
          console.error('Could not claim invite code:', result.error);
        }

        /* Step 4: Success */
        setLoading(false);
        form.style.display = 'none';
        showSuccess('Account created! Redirecting to setup...');
        setTimeout(function() {
          window.location.href = 'setup.html';
        }, 1500);
      })
      .catch(function(err) {
        showError('Something went wrong. Please try again.');
        setLoading(false);
        console.error(err);
      });
  });
</script>
</body>
</html>
